[phases.setup]
nixPkgs = ["nodejs_20", "python3", "pkg-config", "pixman", "cairo", "pango", "libjpeg", "libpng", "giflib"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --no-audit",
  "node -e \"try{const fs=require('fs');const fix=f=>{try{const s=fs.readFileSync(f,'utf8');if(s.includes('export')&&!s.includes('module.exports')){fs.writeFileSync(f,s.replace(/export default (\\w+)/,'module.exports=$1').replace(/export\\s*\\{[^}]*\\}/,''));}}catch(_){}};fix('node_modules/gradient-string/dist/index.js');fix('node_modules/@dongdev/fca-unofficial/node_modules/gradient-string/dist/index.js');\" || true"
]

[start]
cmd = "node index.js"
