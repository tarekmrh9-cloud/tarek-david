[build]
builder = "nixpacks"

[deploy]
startCommand = "node index.js"
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 15

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "pkg-config", "pixman", "cairo", "pango", "libjpeg", "libpng", "giflib"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --no-audit --prefer-offline",
  "node -e \"try{const fs=require('fs');const fix=f=>{try{const s=fs.readFileSync(f,'utf8');if(s.includes('export')&&!s.includes('module.exports')){fs.writeFileSync(f,s.replace('export default',\"const _gs=\").replace(/export\\s+\\{[^}]*\\}/,'module.exports=_gs;'));}}catch(_){}};fix('node_modules/gradient-string/dist/index.js');fix('node_modules/@dongdev/fca-unofficial/node_modules/gradient-string/dist/index.js');\" || true"
]
